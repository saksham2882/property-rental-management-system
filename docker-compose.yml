version: '3.8'

services:
  database:
    image: mongo:latest
    container_name: rental-portal-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./rental-portal-backend
      dockerfile: Dockerfile
    container_name: rental-portal-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://database:27017
    depends_on:
      - database
    restart: unless-stopped

  frontend:
    build:
      context: ./rental-portal-frontend
      dockerfile: Dockerfile
    container_name: rental-portal-frontend
    ports:
      - "4200:4200"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo-data:
