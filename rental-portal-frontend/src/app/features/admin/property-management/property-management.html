<div class="container animate-fadeIn">

  @if (!isFormOpen) {
    <app-property-table-list
      [properties]="properties"
      [loading]="(loading$ | async) || false"
      (add)="openCreateForm()"
      (edit)="openEditForm($event)"
      (delete)="onDelete($event)">
    </app-property-table-list>
  } 
  @else {
    <app-property-form-panel
      [propertyForm]="propertyForm"
      [isEditMode]="isEditMode"
      [uploadedImages]="uploadedImages"
      [uploadingFile]="uploadingFile"
      (submitForm)="onSubmit()"
      (close)="closeForm()"
      (uploadPhoto)="onFileChange($event)"
      (removePhoto)="removeImage($event)">
    </app-property-form-panel>
  }

  <app-modal 
    [isOpen]="isDeleteModalOpen" 
    title="Delete Listing" 
    size="sm" 
    (close)="closeDeleteConfirm()">
    <div class="flex flex-col gap-4">
      <p class="text-sm text-muted">Are you sure you want to delete this listed unit? This action cannot be undone and all active listings under this property will be permanently removed.</p>
      <div class="flex gap-3">
        <button (click)="closeDeleteConfirm()" class="btn btn-secondary flex-1">Cancel</button>
        <button (click)="confirmDelete()" class="btn btn-danger flex-1">Delete Listing</button>
      </div>
    </div>
  </app-modal>

</div>
