<div class="container animate-fadeIn">
  
  <div class="page-header">
    <div class="page-title-block">
      <h1 class="text-headline">Profile Settings</h1>
      <p class="text-muted text-sm">Manage your account preferences, contact information, and rental parameters.</p>
    </div>
  </div>

  @if (error$ | async; as errorMsg) {
    <div class="alert alert-danger error-alert">
      <app-icon name="alert-triangle" size="md" class="flex-shrink-0"></app-icon>
      <span>{{ errorMsg }}</span>
    </div>
  }

  @if (currentUser$ | async; as user) {
    <div class="profile-layout-grid">
      
      <div class="summary-column">
        <app-profile-summary [user]="user"></app-profile-summary>
      </div>

      <div>
        <app-profile-form
          [profileForm]="profileForm"
          [loading]="loading$ | async"
          (save)="onSubmit()">
        </app-profile-form>
      </div>

    </div>
  }

</div>
