<div [class]="wrapperClass">
  @if (overlay) {
    <div class="cartoon-loader-wrap">
      <div class="blueprint-grid"></div>

      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" class="architect-svg">
        <defs>
          <filter id="glow3d" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#6366f1" flood-opacity="0.25" />
          </filter>

          <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#bae6fd" stop-opacity="0.85" />
            <stop offset="100%" stop-color="#0284c7" stop-opacity="0.4" />
          </linearGradient>

          <linearGradient id="woodGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#f59e0b" />
            <stop offset="100%" stop-color="#b45309" />
          </linearGradient>

          <linearGradient id="roofGrad3d" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#6366f1" />
            <stop offset="100%" stop-color="#312e81" />
          </linearGradient>

          <radialGradient id="shadowGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#090d16" stop-opacity="0.6" />
            <stop offset="100%" stop-color="#090d16" stop-opacity="0" />
          </radialGradient>
        </defs>

        <ellipse cx="50" cy="74" rx="34" ry="14" fill="url(#shadowGrad)" opacity="0">
          <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.88;1" dur="3.6s" repeatCount="indefinite" />
          <animateTransform attributeName="transform" type="scale" values="0;1;1;0" keyTimes="0;0.15;0.88;1" dur="3.6s" repeatCount="indefinite" transform-origin="50 74" />
        </ellipse>

        <g opacity="0" filter="url(#glow3d)">
          <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.05;0.12;0.88;1" dur="3.6s" repeatCount="indefinite" />
          <animateTransform attributeName="transform" type="translate" values="0,-40; 0,0; 0,0; 0,20" keyTimes="0;0.05;0.15;0.88;1" dur="3.6s" repeatCount="indefinite" />
          
          <polygon points="20,68 50,80 80,68 50,56" fill="#cbd5e1" stroke="#94a3b8" stroke-width="0.5" />
          <polygon points="20,68 50,80 50,83 20,71" fill="#94a3b8" />
          <polygon points="50,80 80,68 80,71 50,83" fill="#64748b" />
        </g>

        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.11;0.18;0.88;1" dur="3.6s" repeatCount="indefinite" />
          <animateTransform attributeName="transform" type="scale" values="1 0; 1 1; 1 1; 1 0" keyTimes="0;0.11;0.20;0.88;1" dur="3.6s" repeatCount="indefinite" transform-origin="50 80" />
          
          <polygon points="20,68 50,80 50,60 20,48" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="0.5" />
          <polygon points="50,80 80,68 80,48 50,60" fill="#475569" stroke="#334155" stroke-width="0.5" />
          
          <polygon points="58,74 68,70 68,58 58,62" fill="#1e293b" />
          <circle cx="66" cy="66" r="0.8" fill="#fbbf24" />
        </g>

        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.22;0.28;0.88;1" dur="3.6s" repeatCount="indefinite" />
          <animateTransform attributeName="transform" type="translate" values="-35,-15; 0,0; 0,0; 35,15" keyTimes="0;0.22;0.31;0.88;1" dur="3.6s" repeatCount="indefinite" />
          
          <polygon points="24,46 48,56 48,36 24,26" fill="url(#woodGrad)" stroke="#78350f" stroke-width="0.5" />
          <line x1="24" y1="36" x2="48" y2="46" stroke="#78350f" stroke-width="0.5" opacity="0.4" />
          <line x1="24" y1="31" x2="48" y2="41" stroke="#78350f" stroke-width="0.5" opacity="0.4" />
          <line x1="24" y1="41" x2="48" y2="51" stroke="#78350f" stroke-width="0.5" opacity="0.4" />
        </g>

        <g opacity="0">
          <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.32;0.38;0.88;1" dur="3.6s" repeatCount="indefinite" />
          <animateTransform attributeName="transform" type="translate" values="35,-15; 0,0; 0,0; -35,15" keyTimes="0;0.32;0.41;0.88;1" dur="3.6s" repeatCount="indefinite" />
          
          <polygon points="48,56 76,45 76,25 48,36" fill="url(#glassGrad)" stroke="#0284c7" stroke-width="0.75" />
          <polygon points="22,48 48,59 78,47 48,36" fill="#1e293b" opacity="0.8" />
          
          <line x1="52" y1="52" x2="68" y2="34" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.6">
            <animate attributeName="stroke-dasharray" values="0,30; 30,0; 0,30" keyTimes="0; 0.5; 1" dur="1.8s" repeatCount="indefinite" />
          </line>
        </g>

        <g opacity="0" filter="url(#glow3d)">
          <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.42;0.48;0.88;1" dur="3.6s" repeatCount="indefinite" />
          <animateTransform attributeName="transform" type="translate" values="0,-45; 0,0; 0,0; 0,45" keyTimes="0;0.42;0.51;0.88;1" dur="3.6s" repeatCount="indefinite" />
          
          <polygon points="20,25 48,37 80,24 48,12" fill="url(#roofGrad3d)" stroke="#312e81" stroke-width="0.5" />
          <polygon points="20,25 48,37 48,39.5 20,27.5" fill="#312e81" />
          <polygon points="48,37 80,24 80,26.5 48,39.5" fill="#1e1b4b" />
        </g>

        <g opacity="0" transform="translate(0, 0)">
          <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.58;0.64;0.88;1" dur="3.6s" repeatCount="indefinite" />
          
          <animateTransform attributeName="transform" 
                            type="translate" 
                            values="0,-40; 0,3; 0,-2; 0,0; 0,0; 0,-30" 
                            keyTimes="0;0.58;0.63;0.67;0.88;1" 
                            dur="3.6s" 
                            repeatCount="indefinite" />

          <g transform="translate(48, 12)">
            <ellipse cx="2" cy="12" rx="6" ry="2" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.8">
              <animate attributeName="rx" values="2;9;2" dur="1.8s" repeatCount="indefinite" />
              <animateTransform attributeName="transform" type="scale" values="1;1.4;1" dur="1.8s" repeatCount="indefinite" transform-origin="2 12" />
            </ellipse>

            <path d="M 2 12 C -4 8, -6 3, -6 -2 C -6 -7, -2 -11, 2 -11 C 6 -11, 10 -7, 10 -2 C 10 3, 8 8, 2 12 Z" 
                  fill="#ef4444" 
                  stroke="#b91c1c" 
                  stroke-width="1" />
            <circle cx="2" cy="-2" r="3" fill="#ffffff" />
          </g>
        </g>
      </svg>
    </div>
  } 
  @else {
    <div class="spinner-ring" [class.lg]="size === 'lg'" [class.xl]="size === 'xl'" [class.accent]="color === 'accent'"></div>
  }
  
  @if (message) {
    <span class="spinner-message">{{ message }}</span>
  }
</div>
