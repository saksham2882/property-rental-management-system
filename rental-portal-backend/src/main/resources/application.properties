spring.application.name=rental-portal-backend
server.port=8080

spring.config.import=optional:file:../.env[.properties]

spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=${MONGODB_DATABASE}

security.jwt.secret=${SECURITY_JWT_SECRET}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

razorpay.key-id=${RAZORPAY_KEY_ID}
razorpay.key-secret=${RAZORPAY_KEY_SECRET}

spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE}

logging.level.org.springframework.security=INFO
logging.level.com.rental.portal=DEBUG

app.cors.allowed-origins=${FRONTEND_URL:http://localhost:4200}